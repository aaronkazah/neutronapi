name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify tag matches pyproject.toml version
        run: |
          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$TOML_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag v${TAG_VERSION} does not match pyproject.toml version ${TOML_VERSION}"
            exit 1
          fi
          echo "Version match: ${TOML_VERSION}"

      - name: Check if version already exists on PyPI
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/neutronapi/${VERSION}/json)
          if [ "$STATUS" = "200" ]; then
            echo "ERROR: Version ${VERSION} already exists on PyPI. Bump the version first."
            exit 1
          fi
          echo "Version ${VERSION} not yet published. Proceeding."

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing
